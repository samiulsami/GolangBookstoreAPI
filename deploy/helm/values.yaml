---
gobookstoreapi:
  appName: gobookstoreapi
  containerName: gobookstoreapi-app
  replicas: 2
  namespace: default

  image:
    name: sami7786/gobookstoreapi
    tag: jaeger
    pullPolicy: Always

  serviceName: gobookstoreapi-service
  specType: LoadBalancer

  ports:
    protocol: TCP
    containerPort: 3000
    targetPort: 3000
    nodePort: 30000

  secret:
    name: env-secrets
    namespace: default
    data:
      adminusername: admin
      adminpassword: admin
      jwtsecret: orangecat

jaeger:
  appName: jaeger
  image:
    name: jaegertracing/all-in-one
    tag: "1.52"
    pullPolicy: Always

  namespace: observability
  host: jaeger-collector.observability.svc
  HTTPCollectorPort: 14268
  OTLPgRPCPort: 4317
  OTLPHTTPPort: 4318
  UIPort: 16686

perses:
  appName: perses
  namespace: default
  image:
    name: persesdev/perses
    tag: latest

  serviceSpecType: NodePort
  containerPort: 8080
  prometheusURL: http://gobookstoreapi-prometheus-server.default.svc.cluster.local

prometheus:
  server:
    enabled: true
    service:
      type: ClusterIP
